<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting to our trusted partner...</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    body {
      background-color: #141211;
      color: #ebd5cc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin-bottom: 20px;
      border: 3px solid rgba(255, 122, 0, 0.3);
      border-radius: 50%;
      border-top-color: #ff7a00;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    a {
      color: #ff7a00;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const target = urlParams.get('url');
      if (target) {
        try {
          const decoded = atob(target); // Decode base64
          if (decoded.startsWith('http')) {
            // Track internally if needed here
            setTimeout(() => {
              window.location.replace(decoded);
            }, 500); // 500ms delay to ensure pixels fire if added later
            return;
          }
        } catch (e) {
          if (target.startsWith('http')) {
             setTimeout(() => {
               window.location.replace(target);
             }, 500);
             return;
          }
        }
      }
      // Fallback
      setTimeout(() => {
        window.location.replace('/');
      }, 2000);
    })();
  </script>
</head>
<body>
  <div class="spinner"></div>
  <p>Securely redirecting you to our trusted partner...</p>
  <p style="font-size: 12px; opacity: 0.6; margin-top: 10px;">If you are not redirected automatically, <a id="fallback-link" href="/">click here</a>.</p>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const target = urlParams.get('url');
    if (target) {
       try {
         const decoded = atob(target);
         document.getElementById('fallback-link').href = decoded;
       } catch (e) {
         document.getElementById('fallback-link').href = target;
       }
    }
  </script>
</body>
</html>
